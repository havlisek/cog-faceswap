name: VideoReverser
options:
  bundleIdPrefix: com.havlisek
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  VideoReverser:
    type: application
    platform: iOS
    sources:
      - VideoReverser
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: VideoReverser/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryAddUsageDescription: "Video Reverser saves your finished videos to your photo library."
        CFBundleDisplayName: "Video Reverser"
        ITSAppUsesNonExemptEncryption: false
